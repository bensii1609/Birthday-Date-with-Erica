<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>A question for you 💕</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@500;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: 'Inter', sans-serif;
      overflow: hidden;
      position: relative;
      background: #1a0a12;
    }

    /* animated gradient bg */
    .bg {
      position: fixed;
      inset: 0;
      background: radial-gradient(ellipse at 20% 50%, #5c1a34 0%, transparent 60%),
                  radial-gradient(ellipse at 80% 20%, #3d1228 0%, transparent 55%),
                  radial-gradient(ellipse at 60% 80%, #6b1e3a 0%, transparent 50%),
                  #120610;
      animation: bgShift 8s ease-in-out infinite alternate;
      z-index: 0;
    }

    @keyframes bgShift {
      0%   { filter: hue-rotate(0deg) brightness(1); }
      100% { filter: hue-rotate(15deg) brightness(1.12); }
    }

    /* floating hearts background */
    .heart-bg {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 1;
    }

    .fheart {
      position: absolute;
      bottom: -60px;
      font-size: 1.4rem;
      animation: floatUp linear infinite;
      opacity: 0;
    }

    @keyframes floatUp {
      0%   { transform: translateY(0) scale(0.6) rotate(0deg); opacity: 0; }
      10%  { opacity: 0.6; }
      90%  { opacity: 0.3; }
      100% { transform: translateY(-110vh) scale(1.1) rotate(20deg); opacity: 0; }
    }

    /* card */
    .card {
      position: relative;
      z-index: 10;
      background: rgba(255,255,255,0.06);
      backdrop-filter: blur(18px);
      border: 1px solid rgba(255,180,160,0.2);
      border-radius: 32px;
      padding: 52px 40px 44px;
      max-width: 380px;
      width: 90%;
      text-align: center;
      box-shadow: 0 30px 80px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.08);
      animation: cardIn 0.8s cubic-bezier(0.34,1.4,0.64,1) both;
    }

    @keyframes cardIn {
      from { opacity: 0; transform: scale(0.7) translateY(40px); }
      to   { opacity: 1; transform: scale(1) translateY(0); }
    }

    .top-emoji {
      font-size: 3rem;
      display: block;
      margin-bottom: 18px;
      animation: swing 2.5s ease-in-out infinite;
    }

    @keyframes swing {
      0%, 100% { transform: rotate(-8deg); }
      50%       { transform: rotate(8deg); }
    }

    .greeting {
      font-family: 'Caveat', cursive;
      font-size: 1.1rem;
      color: #f0a0b0;
      letter-spacing: 1px;
      margin-bottom: 10px;
    }

    h1 {
      font-family: 'Caveat', cursive;
      font-size: clamp(2rem, 7vw, 2.8rem);
      color: #fff;
      line-height: 1.2;
      margin-bottom: 10px;
    }

    h1 em {
      color: #f9a0b5;
      font-style: normal;
    }

    .sub {
      font-size: 0.85rem;
      color: rgba(255,255,255,0.4);
      margin-bottom: 40px;
      font-weight: 300;
    }

    /* YES button */
    .btn-yes {
      display: block;
      width: 100%;
      padding: 18px;
      background: linear-gradient(135deg, #e8607a, #c93060);
      color: #fff;
      font-family: 'Caveat', cursive;
      font-size: 1.6rem;
      border: none;
      border-radius: 18px;
      cursor: pointer;
      box-shadow: 0 8px 30px rgba(200,48,96,0.5), 0 0 0 0 rgba(232,96,122,0.4);
      animation: glow 2s ease-in-out infinite;
      transition: transform 0.15s ease, box-shadow 0.15s ease;
      margin-bottom: 16px;
      text-decoration: none;
    }

    .btn-yes:hover {
      transform: translateY(-3px) scale(1.03);
      box-shadow: 0 14px 40px rgba(200,48,96,0.65);
    }

    .btn-yes:active { transform: scale(0.97); }

    @keyframes glow {
      0%, 100% { box-shadow: 0 8px 30px rgba(200,48,96,0.5), 0 0 0 0 rgba(232,96,122,0); }
      50%       { box-shadow: 0 8px 30px rgba(200,48,96,0.5), 0 0 20px 6px rgba(232,96,122,0.3); }
    }

    /* NO button — small, grey, sad */
    .btn-no {
      display: inline-block;
      padding: 8px 20px;
      background: rgba(255,255,255,0.07);
      color: rgba(255,255,255,0.3);
      font-family: 'Inter', sans-serif;
      font-size: 0.78rem;
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 10px;
      cursor: pointer;
      transition: all 0.2s ease;
      text-decoration: none;
    }

    .btn-no:hover {
      background: rgba(255,255,255,0.11);
      color: rgba(255,255,255,0.5);
    }

    /* sparkle dots */
    .sparkles {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 2;
    }

    .spark {
      position: absolute;
      width: 3px;
      height: 3px;
      border-radius: 50%;
      background: #f9c0d0;
      animation: twinkle ease-in-out infinite;
      opacity: 0;
    }

    @keyframes twinkle {
      0%, 100% { opacity: 0; transform: scale(0.5); }
      50%       { opacity: 0.8; transform: scale(1.4); }
    }
  </style>
</head>
<body>

  <div class="bg"></div>

  <!-- floating hearts -->
  <div class="heart-bg" id="heartBg"></div>

  <!-- sparkles -->
  <div class="sparkles" id="sparkles"></div>

  <!-- card -->
  <div class="card">
    <span class="top-emoji">💌</span>
    <p class="greeting">hey erica</p>
    <h1>are you free on the evening of<br/><em>June 12th?</em></h1>


    <button class="btn-yes" onclick="handleYes()">Yes!! Of course 💕</button>
    <button class="btn-no" onclick="handleNo()">no</button>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
  <script>
    // ── EmailJS config — fill these in after setup ──
    const EJS_PUBLIC_KEY  = 'xsBeGGMO4S6KhA19Y';
    const EJS_SERVICE_ID  = 'service_6aubybc';
    const EJS_TEMPLATE_ID = 'template_1cujlvw';

    emailjs.init({ publicKey: EJS_PUBLIC_KEY });

    function sendNotification(answer) {
      const noCount = parseInt(localStorage.getItem('noCount') || '0');
      emailjs.send(EJS_SERVICE_ID, EJS_TEMPLATE_ID, {
        answer: answer,
        no_count: noCount,
        time: new Date().toLocaleString('en-GB')
      }).catch(() => {}); // silent — never show errors to Erica
    }

    function handleYes() {
      localStorage.setItem('noCount', '0');
      sendNotification('YES 🎉 She said yes to June 12th!');
      setTimeout(() => { window.location.href = 'plan.html'; }, 300);
    }

    function handleNo() {
      const noCount = parseInt(localStorage.getItem('noCount') || '0') + 1;
      localStorage.setItem('noCount', noCount);
      sendNotification('No 😢 (attempt #' + noCount + ')');
      setTimeout(() => { window.location.href = 'no.html'; }, 300);
    }

    // floating hearts
    const hEmojis = ['❤️','💕','🌹','💗','💓','✨','🩷','💖'];
    const hBg = document.getElementById('heartBg');
    for (let i = 0; i < 25; i++) {
      const h = document.createElement('span');
      h.className = 'fheart';
      h.textContent = hEmojis[Math.floor(Math.random() * hEmojis.length)];
      h.style.left = Math.random() * 100 + 'vw';
      h.style.fontSize = (0.9 + Math.random() * 1.6) + 'rem';
      h.style.animationDuration = (6 + Math.random() * 10) + 's';
      h.style.animationDelay = (Math.random() * 10) + 's';
      hBg.appendChild(h);
    }

    // sparkles
    const sp = document.getElementById('sparkles');
    for (let i = 0; i < 40; i++) {
      const s = document.createElement('div');
      s.className = 'spark';
      s.style.left = Math.random() * 100 + 'vw';
      s.style.top = Math.random() * 100 + 'vh';
      s.style.animationDuration = (2 + Math.random() * 4) + 's';
      s.style.animationDelay = (Math.random() * 5) + 's';
      s.style.width = s.style.height = (2 + Math.random() * 3) + 'px';
      sp.appendChild(s);
    }
  </script>
</body>
</html>
